appId: me.cyzr.superwhisper-analytics-myme
productName: SuperWhisper Analytics (Myme)
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{_tmp,_local}/**'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  entitlementsInherit: build/entitlements.mac.plist
  # Hardened runtime + notarisation. electron-builder reads:
  #   • CSC_LINK + CSC_KEY_PASSWORD for the Developer ID Application
  #     certificate (signing)
  #   • APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID for
  #     notarytool (notarisation)
  # All five live in GitHub Actions secrets; the release workflow
  # passes them through as env vars. A local `pnpm build:mac` without
  # those env vars will skip signing/notarisation and produce an
  # unsigned .dmg — same as before.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# publish stanza intentionally removed for the local Myme install build —
# no latest-mac.yml is produced and auto-update is disabled in main.ts.
