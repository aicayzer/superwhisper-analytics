appId: me.cyzr.superwhisper-analytics
productName: SuperWhisper Analytics
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{_tmp,_local}/**'
# Note on dependency packaging:
# `debug` and `ms` are declared as direct dependencies in package.json
# even though they're transitives of electron-updater. This works around
# electron-builder #9654 — its pnpm-aware dep walker, triggered by the
# `packageManager` field in package.json, drops `ms` from the asar even
# when node_modules is hoisted flat. Without the explicit declaration,
# packaged builds crash on launch with `Cannot find module 'ms'` the
# moment electron-updater loads. Remove the explicit deps when #9654 is
# resolved upstream.
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  entitlementsInherit: build/entitlements.mac.plist
  # Hardened runtime + notarisation. electron-builder reads:
  #   • CSC_LINK + CSC_KEY_PASSWORD for the Developer ID Application
  #     certificate (signing)
  #   • APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID for
  #     notarytool (notarisation)
  # All five live in GitHub Actions secrets; the release workflow
  # passes them through as env vars. A local `pnpm build:mac` without
  # those env vars will skip signing/notarisation and produce an
  # unsigned .dmg — same as before.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: aicayzer
  repo: superwhisper-analytics
