# Dependabot keeps deps fresh and surfaces security advisories. Tuned
# to be quiet:
#   • monthly cadence — once a month, not every Monday
#   • single combined group per ecosystem — one PR for all non-major
#     bumps instead of per-package noise
#   • low PR limits — at most 2 npm + 1 actions PR open at a time
#   • majors of risky / config-shifting packages are ignored
#     (Electron, Vite, @vitejs/plugin-react, TypeScript, ESLint,
#     @types/node, vitest) — bump them manually after a config audit
#
# Security advisories arrive regardless of any of this — they're a
# separate channel that always opens a PR when a CVE applies.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '08:00'
      timezone: Europe/London
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      # Everything non-major lands in ONE PR per month so reviewing
      # them is a single sitting, not a deluge.
      non-major:
        applies-to: version-updates
        update-types:
          - patch
          - minor
    ignore:
      # Electron majors get manual bumps — too much risk of subtle
      # behaviour changes (Chromium / V8 / Node updates) to land via an
      # unreviewed auto-merge.
      - dependency-name: electron
        update-types:
          - version-update:semver-major
      # Vite majors are locked to electron-vite's peer-dep range
      # (currently ^5.0.0 || ^6.0.0 || ^7.0.0). Bump Vite manually only
      # when electron-vite ships a compatible major.
      - dependency-name: vite
        update-types:
          - version-update:semver-major
      # @vitejs/plugin-react 6.x imports `vite/internal` which only
      # exists on Vite 8. We're pinned to Vite 7, so plugin-react majors
      # break the build. Bump manually after Vite moves.
      - dependency-name: '@vitejs/plugin-react'
        update-types:
          - version-update:semver-major
      # TypeScript majors change strict-typing semantics enough that a
      # green CI on an auto-merge isn't a safe signal — needs a manual
      # tsconfig audit. Bump manually when ready.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      # ESLint majors typically change flat-config plugin loading or
      # core rule defaults; needs a manual rule sweep. Bump manually.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      # @types/node tracks Node majors and is purely dev-time; not
      # worth the churn for a monthly major bump.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
      # vitest majors typically change config / setup-file semantics —
      # needs a manual review when we want it.
      - dependency-name: vitest
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '08:00'
      timezone: Europe/London
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
    groups:
      # Every actions update — patch, minor, major — into a single
      # monthly PR. Actions bumps are low-risk and reviewing one PR
      # is fine.
      all-actions:
        applies-to: version-updates
        patterns:
          - '*'
