# Dependabot keeps npm + GitHub Actions dependencies fresh and surfaces
# security advisories as PRs. Weekly cadence is enough for a personal
# project — daily PRs would just be noise. Groups patch-level updates
# together so the bulk of PRs are batched.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patches:
        applies-to: version-updates
        update-types:
          - patch
      minor:
        applies-to: version-updates
        update-types:
          - minor
    ignore:
      # Electron majors get manual bumps — too much risk of subtle
      # behaviour changes (Chromium / V8 / Node updates) to land via an
      # unreviewed auto-merge.
      - dependency-name: electron
        update-types:
          - version-update:semver-major
      # Vite majors are locked to electron-vite's peer-dep range
      # (currently ^5.0.0 || ^6.0.0 || ^7.0.0). Bump Vite manually only
      # when electron-vite ships a compatible major.
      - dependency-name: vite
        update-types:
          - version-update:semver-major
      # @vitejs/plugin-react 6.x imports `vite/internal` which only
      # exists on Vite 8. We're pinned to Vite 7, so plugin-react majors
      # break the build. Bump manually after Vite moves.
      - dependency-name: '@vitejs/plugin-react'
        update-types:
          - version-update:semver-major
      # TypeScript majors change strict-typing semantics enough that a
      # green CI on an auto-merge isn't a safe signal — needs a manual
      # tsconfig audit. Bump manually when ready.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      # ESLint majors typically change flat-config plugin loading or
      # core rule defaults; needs a manual rule sweep. Bump manually.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/London
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      # Batch every actions update into a single PR per week so the
      # repo doesn't get N parallel actions/checkout / setup-node /
      # codeql-action / etc bumps each cycle.
      all-actions:
        applies-to: version-updates
        patterns:
          - '*'
