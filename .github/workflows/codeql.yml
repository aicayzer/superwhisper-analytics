# CodeQL static analysis for JS/TS. Runs on every PR + push to main +
# a weekly cron so advisories landing against existing code still
# surface. Findings appear in the repo's Security tab.
#
# No untrusted-input usage in this workflow; only static literal values
# and built-in actions, so no command-injection surface.

name: CodeQL

on:
  # `push: main` would just duplicate the PR run since every change
  # reaches main via PR — dropped to save CI minutes.
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
