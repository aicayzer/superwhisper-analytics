name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and publish .dmg
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build and publish
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing — Developer ID Application cert.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarisation — Apple notarytool credentials.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # electron-builder uploads five assets: the .dmg, a .zip, two
      # .blockmap files and `latest-mac.yml`. The .dmg is the only one
      # a human downloads — the rest are auto-update plumbing. Pin a
      # short "Install" note to the bottom of the release body so anyone
      # landing on the Releases page knows what to grab.
      - name: Append install note to release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          DMG="superwhisper-analytics-${VERSION}.dmg"
          NOTE=$(cat <<EOF

          ---

          ## Install

          Download **\`${DMG}\`** below. Open it and drag \`SuperWhisper Analytics.app\` into \`/Applications\`. Signed + notarised — opens without the Gatekeeper warning.

          The other assets (\`.zip\`, \`.blockmap\`, \`latest-mac.yml\`) are auto-update plumbing; you do not need them.
          EOF
          )
          EXISTING=$(gh release view "$TAG" --json body --jq .body)
          printf '%s%s' "$EXISTING" "$NOTE" | gh release edit "$TAG" --notes-file -
          # electron-builder creates the release as a draft by default;
          # promote it to published so it appears on the Releases page.
          gh release edit "$TAG" --draft=false
