<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SuperWhisper Analytics</title>
    <!-- sw: appears on media-src (for <audio src="sw://..."/>) and on
         connect-src (for fetch() in audio-peaks.ts during waveform decode).
         Without these the renderer's CSP falls back to default-src 'self'
         which blocks every sw:// load. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; media-src 'self' sw:; connect-src 'self' sw:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
