# Superwhisper Analytics Configuration
# This is the default configuration file. Create a config.local.ini file to override these settings.

[paths]
# Path to recordings directory (relative to script location or absolute)
recordings_dir = ../recordings

# Path to output directory (relative to script location or absolute)
output_dir = ./outputs

[analysis]
# Number of top words to include in word frequency analysis
default_top_words = 500

# Number of top phrases to include in phrase analysis
default_top_bigrams = 100
default_top_trigrams = 50

[charts]
# Chart generation settings
top_words_count = 20
top_topics_count = 5
top_modes_count = 10
top_fillers_count = 10

# Date format preferences for charts
# Use Python strftime format codes (note: %% is used to escape % in config files)
# Examples: %%d-%%m for "31-3", W%%W for "W13", %%b for "Mar"
date_format_daily = %%d-%%m
date_format_weekly = W%%W
date_format_monthly = %%b

# Chart type to use for different aggregations
# Options: line, bar
daily_chart_type = line
weekly_chart_type = bar
monthly_chart_type = bar

