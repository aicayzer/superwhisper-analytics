# Ruff configuration for Superwhisper Analytics
# Maintains financial services quality standards

line-length = 120
target-version = "py39"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",  # Line too long (handled by formatter)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__ are OK
"tests/*" = ["S101"]      # Assert statements are fine in tests

